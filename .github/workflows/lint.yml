name: Lint
'on':
  - push
  - pull_request
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.x
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          pip3 install --disable-pip-version-check ansible editorconfig-checker molecule[lint]

      - name: Run linter
        run: |
          make version
          make lint
